<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tom Emem">
    <meta name="description" content="Live weather display for Trier, Germany using OpenWeatherMap API">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWeatherMap.org API Test</title>
    <link rel="stylesheet" href="styles/weather.css">
    <script type="module" src="scripts/weather.js"></script>
</head>

<body>
    <header>
        <h1>OpenWeatherMap.org API Test</h1>
    </header>

    <main>
        <p>The current temperature in Trier, Germany is <span id="current-temp"></span>°C</p>
        <figure>
            <img id="weather-icon" src="" alt="Weather icon">
            <figcaption id="weather-desc"></figcaption>
        </figure>
    </main>

    <footer>
        Your Name | OpenWeatherMap.org | CC BY-SA 4.0
    </footer>

</body>

</html>
