<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="description" content="BYU-I WDD 231: Modular JavaScript Example - Manage course sections and enrollments">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYU-I Course Enrollment</title>
    <link rel="stylesheet" href="styles/modules.css">
    <script type="module" src="scripts/modules.mjs"></script>
</head>

<body>
    <header>
        <h1 id="courseTitle">Course Title</h1>
        <nav>
            <a href="#">Home</a> |
            <a href="#">W1</a> |
            <a href="#">W2</a> |

            <a href="#">W4</a> |
            <a href="#">W5</a> |

    <main>
        <section>
            <label for="sectionNumber">Select Section:</label>

            <button id="dropStudent">Drop Student</button>

        <section>
            <h2>Sections:</h2>
            <ul id="sections"></ul>
        </section>
    </main>

    <footer>
